# a docker yaml multiqc
- scope: process
  name: "multiqc_p1"
  container: "ubuntu:24.04"
  environment: "docker"
  var:
    extra_args: ""
    my_multiqc_argument: "This is just a multiqc."

- scope: process
  name: "multiqc_p2"
  container: "python:3.13-slim"
  environment: "docker"
  var:
    map.file: "./test/data.txt"

- scope: process
  name: "multiqc_p3"
  container: "r-base:4.5.1"
  environment: "docker"

- scope: global
  var:
    mk.output: "./test/test-output"