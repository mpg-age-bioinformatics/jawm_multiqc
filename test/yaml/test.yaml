- scope: process
  name: "multiqc"
  environment: "docker"
  var:
    map.fastqc: "./test/test-input/fastqc_output"
    map.featurecounts: "./test/test-input/fastqc_output"
    map.mapping: "./test/test-input/kallisto_output"
    mk.multiqc_output: "./test/test-output/multiqc_output"

- scope: hash
  include: 
    - ./test/test-output/multiqc_output/multiqc_data/multiqc_citations.txt
    - ./test/test-output/multiqc_output/multiqc_data/multiqc_fastqc.txt
    - ./test/test-output/multiqc_output/multiqc_data/multiqc_general_stats.txt
    - ./test/test-output/multiqc_output/multiqc_data/multiqc_rseqc_infer_experiment.txt
    - ./test/test-output/multiqc_output/multiqc_data/multiqc_samtools_flagstat.txt
  overwrite: true # overwrite any existing hash already present on the logs folder
